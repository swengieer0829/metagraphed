name: Sync Subnets

on:
  schedule:
    # Every 6h, an hour before each publish (cron 17 1,7,13,19) so a merged sync
    # PR feeds fresh native/candidate data into the next publish. Was 2×/day,
    # which let native data drift past the 24h freshness gate and stall publishes.
    - cron: "17 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-subnets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Setup uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Install
        run: npm ci

      - name: Refresh registry pipeline
        run: npm run pipeline:refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METAGRAPH_WRITE_PROBE_RESULTS: "1"
          # A token is always present here, so a 401 means the token is broken;
          # fail loudly instead of silently shipping degraded adapter data.
          METAGRAPH_REQUIRE_ADAPTER_AUTH: "1"

      # Belt-and-suspenders for Finding 1: refuse to commit adapter snapshots that
      # degraded to broken auth / all-HTML-fallback during the refresh above.
      - name: Validate adapter data quality
        run: npm run validate:adapters
        env:
          METAGRAPH_REQUIRE_ADAPTER_AUTH: "1"

      - name: Generate sync summary
        run: |
          mkdir -p "$RUNNER_TEMP/sync-output"
          npm run sync:summary > "$RUNNER_TEMP/sync-output/metagraphed-sync-summary.md"

      - name: Capture generated changes
        id: changes
        run: |
          allowed_paths=(
            public/metagraph
            registry/adapters/latest
            registry/candidates/generated
            registry/generated
            registry/native/finney-subnets.json
            registry/subnets
            registry/verification
          )
          git ls-files --others --exclude-standard > "$RUNNER_TEMP/sync-output/untracked-files.txt"
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            case "$file" in
              public/metagraph/*|registry/adapters/latest/*|registry/candidates/generated/*|registry/generated/*|registry/native/finney-subnets.json|registry/subnets/*|registry/verification/*) ;;
              *)
                echo "Unexpected untracked file outside the sync allowlist: $file" >&2
                exit 1
                ;;
            esac
          done < "$RUNNER_TEMP/sync-output/untracked-files.txt"
          git add -N -- "${allowed_paths[@]}"
          git diff --name-only > "$RUNNER_TEMP/sync-output/changed-files.txt"
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            case "$file" in
              public/metagraph/*|registry/adapters/latest/*|registry/candidates/generated/*|registry/generated/*|registry/native/finney-subnets.json|registry/subnets/*|registry/verification/*) ;;
              *)
                echo "Unexpected generated change outside the sync allowlist: $file" >&2
                exit 1
                ;;
            esac
          done < "$RUNNER_TEMP/sync-output/changed-files.txt"
          git diff --binary -- "${allowed_paths[@]}" > "$RUNNER_TEMP/sync-output/subnet-registry.patch"
          if git diff --quiet -- "${allowed_paths[@]}"; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload generated changes
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: subnet-registry-sync
          path: ${{ runner.temp }}/sync-output
          if-no-files-found: error
          retention-days: 1

      # A failing sync (chain RPC rate-limits) is what starved the publish gate.
      # Opt-in: no-ops unless METAGRAPH_ALERT_WEBHOOK_URL is set.
      - name: Notify on failure
        if: failure()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.METAGRAPH_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "${ALERT_WEBHOOK_URL:-}" ]; then
            echo "No METAGRAPH_ALERT_WEBHOOK_URL configured; skipping alert."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -fsS -m 15 -X POST "$ALERT_WEBHOOK_URL" \
            -H 'content-type: application/json' \
            -d "{\"text\":\"🟠 metagraphed subnet sync failed — ${RUN_URL}\"}" || true

  pull-request:
    runs-on: ubuntu-latest
    needs: sync
    if: needs.sync.outputs.has_changes == 'true'
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Download generated changes
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: subnet-registry-sync
          path: ${{ runner.temp }}/sync-output

      - name: Apply generated changes
        run: git apply --index --whitespace=nowarn "$RUNNER_TEMP/sync-output/subnet-registry.patch"

      - name: Open sync pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/sync-subnets
          delete-branch: true
          title: "chore(sync): refresh subnet registry data"
          commit-message: "chore(sync): refresh subnet registry data"
          body-path: ${{ runner.temp }}/sync-output/metagraphed-sync-summary.md
