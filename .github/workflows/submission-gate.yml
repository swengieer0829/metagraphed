name: Submission Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: submission-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  metagraphed-submission-gate:
    name: metagraphed-submission-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR input worktree
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: pr
          fetch-depth: 0

      - name: Checkout trusted base worktree
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: trusted
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          fetch-depth: 0

      - name: Capture PR changed files
        working-directory: pr
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed_files="$RUNNER_TEMP/submission-gate-changed-files.txt"
          route_report="$RUNNER_TEMP/submission-route.json"
          preflight_report="$RUNNER_TEMP/submission-report.json"

          git diff --name-only "$BASE_SHA"..."$HEAD_SHA" > "$changed_files"

          {
            echo "CHANGED_FILES=$changed_files"
            echo "SUBMISSION_ROUTE_REPORT=$route_report"
            echo "SUBMISSION_PREFLIGHT_REPORT=$preflight_report"
          } >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.0
          cache: npm
          cache-dependency-path: trusted/package-lock.json

      - name: Install trusted dependencies
        working-directory: trusted
        run: npm ci

      - name: Classify PR submission route with trusted code
        id: route
        working-directory: trusted
        run: node scripts/ci-validate-route.mjs --changed-files "$CHANGED_FILES" --out "$SUBMISSION_ROUTE_REPORT"

      - name: Run trusted UGC submission preflight against PR input
        if: steps.route.outputs.mode == 'ugc'
        working-directory: trusted
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: node scripts/submission-pr.mjs --changed-files "$CHANGED_FILES" --input-root ../pr --out "$SUBMISSION_PREFLIGHT_REPORT" --submitter "$PR_AUTHOR"

      - name: Skip non-submission PRs
        if: steps.route.outputs.mode != 'ugc'
        run: echo "No direct community submission detected; full validation remains authoritative for this PR."
