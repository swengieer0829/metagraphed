name: Publish client SDK

# Publishes @jsonbored/metagraphed (packages/client) to npm via OIDC trusted
# publishing — no NPM_TOKEN. Manual trigger; the version is read from
# packages/client/package.json. Requires a one-time npm-side setup (see
# packages/client/PUBLISHING.md): a first bootstrap
# publish, and a Trusted Publisher pointing at this repo + workflow + the
# `npm-production` environment.
on:
  # release-please dispatches this workflow after it merges a Release PR and
  # creates the client-v<semver> tag + GitHub Release (#394), passing
  # released_by_release_please=true so this run skips re-tagging. A bare manual
  # dispatch is the override and self-tags. A push:tags trigger can't be used:
  # GITHUB_TOKEN-created tags don't fire workflows, and the validate gate requires
  # GITHUB_REF=refs/heads/main (a tag ref would fail it).
  workflow_dispatch:
    inputs:
      released_by_release_please:
        description: "Internal: set by release-please's dispatch so this run skips the tag/release it already created."
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: client-package-release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.17.0
          registry-url: https://registry.npmjs.org

      - name: Validate release version
        env:
          RELEASE_PLEASE_TRIGGERED: ${{ inputs.released_by_release_please }}
        run: bash scripts/validate-client-release.sh

      # Build + pack happen in THIS unprivileged job (no id-token). The privileged
      # publish job below never runs npm install/build, so a compromised build
      # dependency can't reach the OIDC token (codex #251).
      - name: Build package tarball
        working-directory: packages/client
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm run build
          npm pack --pack-destination "$RUNNER_TEMP"
          count=$(find "$RUNNER_TEMP" -maxdepth 1 -type f -name "*.tgz" | wc -l | tr -d ' ')
          if [ "$count" != "1" ]; then
            echo "Expected exactly one tarball, found $count" >&2
            find "$RUNNER_TEMP" -maxdepth 1 -type f -name "*.tgz" -print >&2
            exit 1
          fi

      - name: Upload package tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: client-package-tarball
          path: ${{ runner.temp }}/*.tgz
          if-no-files-found: error
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    environment: npm-production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.17.0
          registry-url: https://registry.npmjs.org

      - name: Validate release version
        id: release
        env:
          RELEASE_PLEASE_TRIGGERED: ${{ inputs.released_by_release_please }}
        run: bash scripts/validate-client-release.sh

      # Pull the tarball built by the unprivileged validate job — this job never
      # runs npm install/build, so no third-party code executes while the OIDC
      # token is available (codex #251).
      - name: Download package tarball
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: client-package-tarball
          path: ${{ runner.temp }}/client-package

      - name: Publish to npm (OIDC trusted publishing)
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail
          count=$(find "$RUNNER_TEMP/client-package" -maxdepth 1 -type f -name "*.tgz" | wc -l | tr -d ' ')
          if [ "$count" != "1" ]; then
            echo "Expected exactly one tarball, found $count" >&2
            find "$RUNNER_TEMP/client-package" -maxdepth 1 -type f -name "*.tgz" -print >&2
            exit 1
          fi
          tarball=$(find "$RUNNER_TEMP/client-package" -maxdepth 1 -type f -name "*.tgz" -print -quit)
          npm publish "$tarball" --access public --provenance --ignore-scripts

      # Only on the bare manual override. When release-please dispatched this run
      # (released_by_release_please=true) it already created the tag + GitHub
      # Release with the generated notes, so re-creating them here would conflict.
      - name: Tag + GitHub release
        if: github.event_name == 'workflow_dispatch' && inputs.released_by_release_please != true
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "@jsonbored/metagraphed v$RELEASE_VERSION"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          gh auth setup-git
          git push origin "$RELEASE_TAG"
          gh release create "$RELEASE_TAG" \
            --title "@jsonbored/metagraphed v$RELEASE_VERSION" \
            --generate-notes \
            --notes "Published \`@jsonbored/metagraphed@$RELEASE_VERSION\` to npm with provenance via OIDC trusted publishing. https://www.npmjs.com/package/@jsonbored/metagraphed/v/$RELEASE_VERSION"
