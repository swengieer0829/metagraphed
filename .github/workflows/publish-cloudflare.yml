name: Publish Cloudflare Backend

# Scheduled DATA refresh (ADR 0001). Builds fresh artifacts (live probes +
# adapter snapshots) and publishes them to R2 + the KV `latest` pointer. The
# Worker CODE + committed assets are deployed separately by Cloudflare Workers
# Builds on push to main; this workflow only refreshes the DATA the Worker
# serves from R2/KV, decoupled from code pushes (so a docs commit no longer
# re-probes 1k+ surfaces). Run with workflow_dispatch publish_mode=dry-run to
# validate without writing to R2/KV.
on:
  schedule:
    # Every 6h — keeps published data within the freshness windows
    # (surface-health blocks at 6h, adapter-snapshots at 24h).
    - cron: "17 1,7,13,19 * * *"
  workflow_dispatch:
    inputs:
      publish_mode:
        description: "Use publish for real R2/KV publish; use dry-run for validation only."
        required: true
        default: publish
        type: choice
        options:
          - publish
          - dry-run

permissions:
  contents: read

concurrency:
  group: publish-cloudflare-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      METAGRAPH_PRODUCTION_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Setup uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Install
        run: npm ci

      - name: Stamp publish time
        run: |
          echo "METAGRAPH_PUBLISHED_AT=$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)" >> "$GITHUB_ENV"

      - name: Prepare reviewed publish artifacts
        run: |
          npm run build
          npm run r2:manifest
        env:
          # The production build re-snapshots adapters from live GitHub metadata
          # so the publish is fresh by construction. A token is always present
          # here, so a 401 means the token is broken; fail loudly instead of
          # shipping degraded adapter data (mirrors sync-subnets.yml).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METAGRAPH_REQUIRE_ADAPTER_AUTH: "1"

      # Belt-and-suspenders for Finding 1: the build just re-snapshotted adapters
      # from live GitHub metadata. Refuse to publish if any degraded to broken
      # auth / all-HTML-fallback (strict via METAGRAPH_PRODUCTION_BUILD).
      - name: Validate adapter data quality
        run: npm run validate:adapters

      - name: Stage reviewed publish artifacts
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/publish-artifacts"
          cp -R public "$RUNNER_TEMP/publish-artifacts/public"
          mkdir -p "$RUNNER_TEMP/publish-artifacts/dist"
          if [ -d dist/metagraph-r2 ]; then
            cp -R dist/metagraph-r2 "$RUNNER_TEMP/publish-artifacts/dist/metagraph-r2"
          fi

      - name: Upload reviewed publish artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cloudflare-publish-artifacts
          path: ${{ runner.temp }}/publish-artifacts
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: refresh
    permissions:
      contents: read
    env:
      METAGRAPH_PRODUCTION_BUILD: "1"
      METAGRAPH_REQUIRE_PROBE_HEALTH: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Download reviewed publish artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: cloudflare-publish-artifacts
          path: ${{ runner.temp }}/publish-artifacts

      - name: Restore reviewed publish artifacts
        run: |
          set -euo pipefail
          find "$RUNNER_TEMP/publish-artifacts" -type l -print -quit | grep -q . && {
            echo "::error::Refusing to restore artifact containing symbolic links."
            exit 1
          }
          rm -rf public/metagraph dist/metagraph-r2
          cp -R "$RUNNER_TEMP/publish-artifacts/public/metagraph" public/metagraph
          if [ -d "$RUNNER_TEMP/publish-artifacts/dist/metagraph-r2" ]; then
            mkdir -p dist
            cp -R "$RUNNER_TEMP/publish-artifacts/dist/metagraph-r2" dist/metagraph-r2
          fi

      - name: Validate registry
        run: npm run validate

      - name: Test
        run: npm test

      - name: Validate backend contracts
        run: |
          npm run validate:schemas
          npm run validate:api
          npm run validate:openapi
          npm run validate:types
          npm run validate:artifact-budgets
          npm run validate:docs
          npm run validate:intake
          npm run validate:workflows

      - name: Public-safety scan
        run: npm run scan:public-safety

      - name: Validate private boundary
        run: npm run validate:private-boundary

      # The validate/test steps above rebuild artifacts in-place WITHOUT the
      # probe-result cache, which clobbers the probe-derived health/pools/
      # freshness the refresh job built (real probe_finished_at + "ok" statuses
      # become the 1970 epoch placeholder + all "unknown"). r2:upload/kv:publish
      # below would then publish that unprobed dataset — leaving every RPC pool
      # with zero eligible endpoints. Re-restore the immutable reviewed artifacts
      # so we publish exactly what was reviewed, then re-run publish-critical
      # guards on that final tree. This keeps probe-health assurance while
      # ensuring no unscanned network-derived metadata reaches R2/KV.
      - name: Re-restore reviewed artifacts and run final publish guards
        run: |
          set -euo pipefail
          rm -rf public/metagraph dist/metagraph-r2
          cp -R "$RUNNER_TEMP/publish-artifacts/public/metagraph" public/metagraph
          if [ -d "$RUNNER_TEMP/publish-artifacts/dist/metagraph-r2" ]; then
            mkdir -p dist
            cp -R "$RUNNER_TEMP/publish-artifacts/dist/metagraph-r2" dist/metagraph-r2
          fi
          npm run assert:probe-health
          npm run scan:public-safety
          npm run validate:private-boundary

      - name: Check Cloudflare publishing secrets
        id: cloudflare-secrets
        run: |
          set -euo pipefail
          publish_mode="${PUBLISH_MODE:-publish}"
          dry_run="false"
          if [ "$publish_mode" = "dry-run" ]; then
            dry_run="true"
          fi

          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$METAGRAPH_KV_NAMESPACE_ID" ]; then
            echo "kv_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "kv_publish=false" >> "$GITHUB_OUTPUT"
          fi

          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

          if [ "$dry_run" != "true" ] && { [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; }; then
            echo "::error::CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID are required for main publish runs. Use workflow_dispatch publish_mode=dry-run for validation-only runs."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          METAGRAPH_KV_NAMESPACE_ID: ${{ secrets.METAGRAPH_KV_NAMESPACE_ID }}
          PUBLISH_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_mode || 'publish' }}

      - name: Upload artifact history to R2
        if: steps.cloudflare-secrets.outputs.publish == 'true' && steps.cloudflare-secrets.outputs.dry_run != 'true'
        run: npm run r2:upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          METAGRAPH_ALLOW_R2_UPLOAD: "1"
          METAGRAPH_R2_UPLOAD_HISTORY: "1"

      - name: Publish KV latest pointer
        if: steps.cloudflare-secrets.outputs.kv_publish == 'true' && steps.cloudflare-secrets.outputs.dry_run != 'true'
        run: npm run kv:publish
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          METAGRAPH_KV_NAMESPACE_ID: ${{ secrets.METAGRAPH_KV_NAMESPACE_ID }}
          METAGRAPH_ALLOW_KV_WRITE: "1"

      # Change-feed webhooks: now that the new data is live in R2/KV, fire
      # HMAC-signed POSTs to matching subscribers. No-ops when there are no
      # subscriptions. The dispatcher always exits 0 — per-subscriber and KV
      # hiccups are logged as warnings but never fail the run, so a broken
      # endpoint can't block the data pipeline or the smoke step below.
      - name: Dispatch change-feed webhooks
        if: steps.cloudflare-secrets.outputs.kv_publish == 'true' && steps.cloudflare-secrets.outputs.dry_run != 'true'
        run: npm run webhooks:dispatch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          METAGRAPH_KV_NAMESPACE_ID: ${{ secrets.METAGRAPH_KV_NAMESPACE_ID }}
          METAGRAPH_ALLOW_WEBHOOK_DISPATCH: "1"

      # Worker CODE is deployed by Cloudflare Workers Builds on push to main;
      # this workflow only refreshes the DATA in R2/KV. The live Worker reads
      # the new KV pointer + R2 on its next origin miss.
      - name: Smoke live API
        if: steps.cloudflare-secrets.outputs.publish == 'true' && steps.cloudflare-secrets.outputs.dry_run != 'true'
        run: |
          # Smoke runs immediately after kv:publish, during the edge-cache
          # revalidation window (routes are 300s-cached + stale-while-revalidate),
          # so it can briefly see in-transition responses. The data publish
          # (r2:upload + kv:publish) has already succeeded by here; retry through
          # the window before failing the run.
          for attempt in 1 2 3 4; do
            if npm run smoke:live; then exit 0; fi
            echo "::warning::smoke:live attempt $attempt failed; edge cache may still be revalidating after kv:publish — retrying in 90s"
            sleep 90
          done
          echo "::error::smoke:live still failing after retries"
          exit 1
        env:
          METAGRAPH_LIVE_BASE_URL: https://api.metagraph.sh

      # Surfaces publish failures immediately (the original cascade went unnoticed
      # for ~a day). Opt-in: no-ops unless METAGRAPH_ALERT_WEBHOOK_URL is set.
      - name: Notify on failure
        if: failure()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.METAGRAPH_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "${ALERT_WEBHOOK_URL:-}" ]; then
            echo "No METAGRAPH_ALERT_WEBHOOK_URL configured; skipping alert."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -fsS -m 15 -X POST "$ALERT_WEBHOOK_URL" \
            -H 'content-type: application/json' \
            -d "{\"text\":\"🔴 metagraphed data publish failed — ${RUN_URL}\"}" || true
