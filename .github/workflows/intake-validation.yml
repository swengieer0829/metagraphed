name: Intake Validation

on:
  issues:
    types:
      - opened
      - edited
      - labeled

permissions:
  contents: read
  issues: write

concurrency:
  group: intake-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: contains(github.event.issue.labels.*.name, 'interface-submission') || contains(github.event.issue.labels.*.name, 'endpoint-submission') || contains(github.event.issue.labels.*.name, 'provider-submission') || contains(github.event.issue.labels.*.name, 'status-report')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Write issue payload
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('issue.json', JSON.stringify(context.payload.issue, null, 2));

      - name: Validate intake issue
        run: npm run intake:dry-run -- --issue-json issue.json --out intake-report.json

      - name: Comment intake report
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const { execFileSync } = require('child_process');
            execFileSync('npm', ['run', 'submission:comment', '--', '--report', 'intake-report.json', '--out', 'intake-comment.md'], { stdio: 'inherit' });
            const body = fs.readFileSync('intake-comment.md', 'utf8');
            const marker = '<!-- metagraphed-submission-gate -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body
              });
            }
